name: Release Flutter

on:
  workflow_call:
    inputs:
      target:
        description: flutter_release.yaml target to build.
        required: true
        type: string
      config:
        description: Path to flutter_release.yaml.
        required: false
        type: string
        default: flutter_release.yaml
      flutter_version:
        description: Flutter SDK version.
        required: false
        type: string
        default: "3.44.0"
      runner:
        description: GitHub runner label.
        required: false
        type: string
        default: macos-latest
      environment:
        description: GitHub environment that provides release secrets.
        required: false
        type: string
        default: release
      artifact_name:
        description: Uploaded workflow artifact name.
        required: false
        type: string
        default: flutter-release
      artifact_path:
        description: Artifact path override. Defaults to Hippo's artifact path for the target.
        required: false
        type: string
        default: ""
      setup_ios_signing:
        description: Import iOS signing certificate and provisioning profiles before build.
        required: false
        type: boolean
        default: false
      publish_ios_app_store:
        description: Publish the built IPA through hippo release flutter publish ios-app-store.
        required: false
        type: boolean
        default: false
      hippo_version:
        description: Hippo CLI version to install.
        required: false
        type: string
        default: "0.1.0"
      devops_ref:
        description: Ref of hipposphere/devops to check out for local actions.
        required: false
        type: string
        default: main
    secrets:
      APP_STORE_CONNECT_KEY_ID:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_PRIVATE_KEY:
        required: false
      IOS_DISTRIBUTION_CERTIFICATE_BASE64:
        required: false
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:
        required: false
      IOS_PROVISIONING_PROFILES_BASE64:
        required: false

permissions:
  contents: read

jobs:
  release:
    name: Build ${{ inputs.target }}
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Check out project
        uses: actions/checkout@v5

      - name: Check out devops actions
        uses: actions/checkout@v5
        with:
          repository: hipposphere/devops
          ref: ${{ inputs.devops_ref }}
          path: .devops

      - name: Set up Hippo
        uses: ./.devops/actions/setup-hippo
        with:
          version: ${{ inputs.hippo_version }}
          setup-flutter: "true"
          flutter-version: ${{ inputs.flutter_version }}
          pub-get: "true"

      - name: Remove devops checkout
        shell: bash
        run: rm -rf .devops

      - name: Import iOS signing material
        if: ${{ inputs.setup_ios_signing }}
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILES_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILES_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          hippo --ci release flutter signing ios \
            --config "${{ inputs.config }}" \
            --target "${{ inputs.target }}"

          if [[ -z "${IOS_DISTRIBUTION_CERTIFICATE_BASE64:-}" ]]; then
            echo "::error::IOS_DISTRIBUTION_CERTIFICATE_BASE64 is required when setup_ios_signing is true."
            exit 1
          fi
          if [[ -z "${IOS_PROVISIONING_PROFILES_BASE64:-}" ]]; then
            echo "::error::IOS_PROVISIONING_PROFILES_BASE64 is required when setup_ios_signing is true."
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/ios_distribution.p12"
          profiles_archive_path="$RUNNER_TEMP/profiles.tar.gz"
          profiles_extract_dir="$RUNNER_TEMP/profiles"
          profiles_destination="$HOME/Library/MobileDevice/Provisioning Profiles"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security import "$certificate_path" \
            -k build.keychain \
            -P "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:-}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

          mkdir -p "$profiles_extract_dir" "$profiles_destination"
          printf '%s' "$IOS_PROVISIONING_PROFILES_BASE64" | base64 --decode > "$profiles_archive_path"
          tar -xzf "$profiles_archive_path" -C "$profiles_extract_dir"
          find "$profiles_extract_dir" -name '*.mobileprovision' -exec cp '{}' "$profiles_destination" ';'

      - name: Build Flutter release
        id: build
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          hippo --ci release flutter build \
            --config "${{ inputs.config }}" \
            --github-output \
            "${{ inputs.target }}"

      - name: Resolve artifact paths
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          path="${{ inputs.artifact_path }}"
          if [[ -z "$path" ]]; then
            path="${{ steps.build.outputs.artifact_path }}"
          fi
          {
            echo "path<<EOF"
            printf '%s\n' "$path" | tr ',' '\n'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Flutter artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ steps.artifacts.outputs.path }}
          if-no-files-found: error

      - name: Install fastlane
        if: ${{ inputs.publish_ios_app_store }}
        shell: bash
        run: sudo gem install fastlane -NV

      - name: Publish iOS app
        if: ${{ inputs.publish_ios_app_store }}
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          hippo --ci release flutter publish ios-app-store \
            --config "${{ inputs.config }}" \
            --target "${{ inputs.target }}"
